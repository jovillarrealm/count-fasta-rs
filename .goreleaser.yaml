# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - rustup default nightly
    - sh -c 'command -v cargo-zigbuild > /dev/null || cargo install --locked cargo-zigbuild'
    - sh -c 'command -v cross > /dev/null || cargo install cross'
    - ./scripts/test_simd_cross.sh
    - cargo fetch --locked

builds:
  - id: linux-win
    builder: rust
    tool: cross
    flags:
      - --release
    targets:
      - x86_64-unknown-linux-gnu
      - aarch64-unknown-linux-gnu
      - x86_64-pc-windows-gnu

  - id: macos
    builder: rust
    tool: cargo-zigbuild
    flags:
      - --release
    targets:
      - x86_64-apple-darwin
      - aarch64-apple-darwin

archives:
  - formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    # use zip for windows archives
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
  
    
    
    ---

    Released with [cross](https://crates.io/crates/cross), [cargo-zigbuild](https://github.com/rust-cross/cargo-zigbuild) and [GoReleaser](https://github.com/goreleaser/goreleaser).
